# Docker Compose version
version: '3.8'
# =========================
# SERVICES (Containers)
# =========================
services:
 # =========================
  # 1. DATABASE (MongoDB)
  # =========================
  mongodb:
  # Official MongoDB image use ho rahi hai
    image: mongo:6
       # Container ka naam
    container_name: jobportal-mongo
     # Agar crash ho jaye to auto restart
    restart: always
       # Data persist rahega even container delete ho jaye
    volumes:
      - mongo-data:/data/db
        # Same network pe baaki services ke sath connect
    networks:
      - jobportal-network
  # =========================
  # 2. BACKEND (Node.js API)
  # =========================
  backend:
      # Backend folder se Docker image build hogi
    build: ./backend
    container_name: jobportal-backend
    restart: always
     # Host port 5000 → container port 5000
    ports:
      - "5000:5000"
      # MongoDB connection (service name "mongodb" use ho raha hai)
         # CORS (frontend allowed origin)
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/jobportal
      - JWT_SECRET=7fK9@pQ2xLm8#vR5zT1nW6uY!aB3cD9eJ$N4sH
      - FRONTEND_URL=http://localhost   # ✅ CORS fix
        # File uploads local machine pe save honge
    volumes:
      - ./backend/uploads:/app/uploads
       # MongoDB pehle start hoga
    depends_on:
      - mongodb
    networks:
      - jobportal-network
# Same network for communication
  # =========================
  # 3. FRONTEND (React + Nginx)
  # =========================
  frontend:
    build:
      context: ./frontend/client
      args:
        - VITE_API_URL=/api             # ✅ Build time env variable
    container_name: jobportal-frontend
    restart: always
    ports:
      - "80:80"
          # Browser → http://localhost
    depends_on:
      - backend
    networks:
      - jobportal-network
# =========================
# VOLUMES (Data storage)
# =========================
volumes:
  mongo-data:
# =========================
# NETWORK (Communication bridge)
# =========================
networks:
  jobportal-network:
    driver: bridge
    # All containers ek dusre se connect honge